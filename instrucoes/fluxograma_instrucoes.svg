<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8f9fa"/>
  <text x="400" y="40" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Fluxo de Automação com RPA (Instruções)</text>
  
  <g transform="translate(50, 80)">
    <rect width="200" height="80" rx="10" fill="#007bff" />
    <text x="100" y="35" font-family="Arial" font-size="16" fill="white" text-anchor="middle" font-weight="bold">1. Sistema Telefonia</text>
    <text x="100" y="55" font-family="Arial" font-size="12" fill="#e0e0e0" text-anchor="middle">Contém os áudios brutos.</text>
    <text x="100" y="70" font-family="Arial" font-size="12" fill="#e0e0e0" text-anchor="middle">Requer Login e Filtros.</text>
  </g>
  
  <path d="M 250 120 L 330 120" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  
  <g transform="translate(350, 80)">
    <rect width="200" height="80" rx="10" fill="#28a745" />
    <text x="100" y="35" font-family="Arial" font-size="16" fill="white" text-anchor="middle" font-weight="bold">2. Robô Playwright</text>
    <text x="100" y="55" font-family="Arial" font-size="12" fill="#e0e0e0" text-anchor="middle">Script RPA (Navegador).</text>
    <text x="100" y="70" font-family="Arial" font-size="12" fill="#e0e0e0" text-anchor="middle">Baixa os arquivos em lote.</text>
  </g>

  <path d="M 450 160 L 450 210" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <g transform="translate(350, 230)">
    <rect width="200" height="80" rx="10" fill="#ffc107" />
    <text x="100" y="35" font-family="Arial" font-size="16" fill="#333" text-anchor="middle" font-weight="bold">3. Banco Local SQLite</text>
    <text x="100" y="55" font-family="Arial" font-size="12" fill="#555" text-anchor="middle">Script de importação.</text>
    <text x="100" y="70" font-family="Arial" font-size="12" fill="#555" text-anchor="middle">Gera Hash SHA-256 e Organiza.</text>
  </g>

  <path d="M 450 310 L 450 360" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <g transform="translate(350, 380)">
    <rect width="200" height="80" rx="10" fill="#dc3545" />
    <text x="100" y="35" font-family="Arial" font-size="16" fill="white" text-anchor="middle" font-weight="bold">4. Inteligência Artificial</text>
    <text x="100" y="55" font-family="Arial" font-size="12" fill="#e0e0e0" text-anchor="middle">Transcreve áudio via IA.</text>
    <text x="100" y="70" font-family="Arial" font-size="12" fill="#e0e0e0" text-anchor="middle">Aplica pesos e gera relatórios.</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666" />
    </marker>
  </defs>
</svg>