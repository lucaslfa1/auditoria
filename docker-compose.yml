services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nstech_audit_app
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - ENVIRONMENT=production
      - TZ=America/Sao_Paulo
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8080
      - PORT=8080
    env_file:
      - .env
      - backend/.env
    volumes:
      - audit-data:/app/backend/data
      - ./Ligações:/app/Ligações
      - ./logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  audit-data:
