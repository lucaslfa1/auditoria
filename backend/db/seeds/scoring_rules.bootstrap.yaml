      "Antes de prosseguirmos, poderia me confirmar sua senha de segurança, por favor?"'
  - label: O operador informou claramente o motivo do contato?
    weight: 1.03
    deflator: 0.0
    description: 'O motorista precisa entender rapidamente o problema para colaborar com a solução. | Exemplo oficial: "Estamos
      identificando a perda do sinal do rastreador e precisamos entender a situação."'
  - label: O operador confirmou a localização atual do motorista? (Em movimento/parado, cidade e referência de local)
    weight: 1.22
    deflator: 0.0
    description: 'É essencial identificar se a falta de sinal está relacionada ao deslocamento ou a um local de sombra de
      sinal. | Exemplo oficial: "O caminhão está parado ou em movimento? Você pode me passar um ponto de referência posto,
      km da rodovia? Qual a cidade?"'
  - label: Passou orientações para forçar posicionamento do rastreador? (Envio de mensagem, reset de bateria, etc.)
    weight: 2.0
    deflator: 0.0
    description: 'Medidas corretivas ajudam a restabelecer o sinal, garantindo continuidade no monitoramento. | Exemplo oficial:
      "Precisamos tentar restabelecer o sinal. Você pode desligar e religar a chave geral do veículo? Ou enviar uma mensagem
      no teclado?"'
  - label: O operador procurou identificar o motivo da perda de sinal? (Embaixo de cobertura, área sem sinal de celular, falha
      no rastreador, etc.)
    weight: 1.05
    deflator: 0.0
    description: 'Compreender a causa ajuda na tomada de decisão e no suporte adequado ao motorista. | Exemplo oficial: "Você
      está em um local coberto, como um túnel ou garagem? Sabe me informar se a região é ruim de sinal?"'
  - label: O operador informou os riscos operacionais e de seguro caso o sinal não restabelecer?
    weight: 1.05
    deflator: 0.0
    description: 'Evita prejuízos, melhora a segurança e assegura responsabilidade e garante monitoramento contínuo. | Exemplo
      oficial: "Caso ocorra um sinistro com o sinal desatualizado, pode haver problemas com a cobertura do seguro da carga
      e do veículo."'
  - label: Realizou a despedida padrão com cordialidade?
    weight: 0.3
    deflator: 0.0
    description: 'Um encerramento educado mantém a postura profissional do atendimento. | Exemplo oficial: "Obrigado por sua
      atenção. Tenha um excelente dia!"'
  - label: Utilizou a função mudo corretamente para evitar ruídos externos?
    weight: 0.3
    deflator: 0.0
    description: 'O uso correto do mudo evita interferências e mantém a qualidade da chamada. | Exemplo oficial: "Vou colocar
      no mudo enquanto verifico as informações. Já volto com você."'
  - label: Evitou silêncios prolongados (mais de 45 segundos sem interação)?
    weight: 0.15
    deflator: 0.0
    description: 'O preenchimento do silêncio mantém o contato ativo e evita que o motorista pense que a ligação caiu. | Exemplo
      oficial: "Estou verificando os dados no sistema. Aguarde um momento enquanto faço a consulta."'
  - label: O operador registrou corretamente o contato no sistema, incluindo número de telefone, nome do responsável, e resumo
      da conversa?
    weight: 0.2
    deflator: 0.0
    description: 'Garante rastreabilidade e facilita acompanhamentos posteriores. | Exemplo oficial: "Contato registrado:
      Cliente [Nome], Telefone: (XX) XXXX-XXXX, Responsável: [Nome], Resumo: Cliente informou que...'
    evaluation_type: manual
  - label: Após a resolução do alerta, finalizou corretamente a ligação sem reter a linha desnecessariamente (10s)?
    weight: 0.3
    deflator: 0.0
    description: Encerrar a ligação de forma objetiva evita atrasos no atendimento.
  - label: O volume de voz, entonação e condução da chamada transmitiram credibilidade e cordialidade, sem excesso de girias?
