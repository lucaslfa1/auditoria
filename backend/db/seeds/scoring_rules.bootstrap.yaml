alerts:
- id: UTI-PRIORITARIO-MOT
  sector: uti
  pop_ref: 4.1.1
  label: Alerta Prioritário - Motorista
  context: Critérios de Auditoria – Alerta Prioritário no Contato com o Motorista
  criteria:
  - label: Saudação?
    weight: 0.1
    deflator: 0.0
    description: 'Fracionamento do critério oficial: O operador se identificou informando saudação, nome, setor e empresa?
      | Exemplo oficial: "Bom dia/Boa tarde/Boa noite, aqui é [Nome], do setor [setor] da Opentech."'
  - label: Nome?
    weight: 0.1
    deflator: 0.0
    description: 'Fracionamento do critério oficial: O operador se identificou informando saudação, nome, setor e empresa?
      | Exemplo oficial: "Bom dia/Boa tarde/Boa noite, aqui é [Nome], do setor [setor] da Opentech."'
  - label: Setor/Empresa?
    weight: 0.1
    deflator: 0.0
    description: 'Fracionamento do critério oficial: O operador se identificou informando saudação, nome, setor e empresa?
      | Exemplo oficial: "Bom dia/Boa tarde/Boa noite, aqui é [Nome], do setor [setor] da Opentech."'
  - label: O operador confirmou a senha de segurança antes de prosseguir?
    weight: 2.0
    deflator: 0.0
    description: 'A verificação de senha protege a comunicação e evita repasses indevidos de informações. | Exemplo oficial:
      "Antes de prosseguirmos, poderia me confirmar sua senha de segurança, por favor?"'
  - label: O operador informou claramente o motivo do contato?
    weight: 1.03
    deflator: 0.0
    description: 'O motorista precisa entender rapidamente a situação para fornecer informações precisas. | Exemplo oficial:
      "Estou entrando em contato devido a um alerta detectado no sistema. Preciso verificar sua situação."'
  - label: O operador confirmou a localização e a condição do motorista?
    weight: 1.7
    deflator: 0.0
    description: 'Ter a posição exata e saber se há risco permite uma melhor análise da ocorrência. | Exemplo oficial: "Pode
      me confirmar onde exatamente você está agora? Movimento ou parado?"'
  - label: O operador identificou o motivo do alerta? (Sinistro, manutenção, problema técnico, acionamento indevido, etc.)
    weight: 1.92
    deflator: 0.0
    description: 'A causa do alerta precisa ser identificada rapidamente para tomada de decisão. | Exemplo oficial: "Consegue
      me informar o que ocorreu para esse alerta ter subido para mim?"'
  - label: O operador solicitou vídeo do veículo nos casos necessários (Painel violado, Botão de pânico, Perda de Bateria,
      Teclado Desconectado, Sensor de desengate e baú)?
    weight: 1.7
    deflator: 0.0
    description: 'A solicitação do vídeo é essencial para análise mais detalhada e para garantir a segurança do motorista
      e da carga. | Exemplo oficial: "O senhor consegue enviar para nós um vídeo no WhatsApp? No vídeo precisa falar seu nome,
      senha de segurança, data e horário atuais”'
  - label: Realizou a despedida padrão com cordialidade?
    weight: 0.3
    deflator: 0.0
    description: 'Um encerramento educado mantém a postura profissional do atendimento. | Exemplo oficial: "Obrigado por sua
      atenção. Tenha um excelente dia!"'
  - label: Utilizou a função mudo corretamente para evitar ruídos externos?
    weight: 0.3
    deflator: 0.0
    description: 'O uso correto do mudo evita interferências e mantém a qualidade da chamada. | Exemplo oficial: "Vou colocar
      no mudo enquanto verifico as informações. Já volto com você."'
  - label: Evitou silêncios prolongados (mais de 45 segundos sem interação)?
    weight: 0.15
    deflator: 0.0
    description: 'O preenchimento do silêncio mantém o contato ativo e evita que o motorista pense que a ligação caiu. | Exemplo
      oficial: "Estou verificando os dados no sistema. Aguarde um momento enquanto faço a consulta."'
  - label: O operador registrou corretamente o contato no sistema, incluindo número de telefone, nome do responsável, e resumo
      da conversa?
    weight: 0.2
    deflator: 0.0
    description: 'Garante rastreabilidade e facilita acompanhamentos posteriores. | Exemplo oficial: Exemplo: Cliente [Nome],
      Telefone: (XX) XXXX-XXXX, Responsável: [Nome], Resumo: Motorista/Cliente informou que...'
    evaluation_type: manual
  - label: Após a resolução do alerta, finalizou corretamente a ligação sem reter a linha desnecessariamente (10s)?
    weight: 0.3
    deflator: 0.0
    description: Encerrar a ligação de forma objetiva evita atrasos no atendimento.
  - label: O volume de voz, entonação e condução da chamada transmitiram credibilidade e cordialidade, sem excesso de gírias?
    weight: 0.1
    deflator: 0.0
    description: O tom de voz adequado reforça confiança e profissionalismo, garantindo que o motorista siga as instruções
      corretamente.
