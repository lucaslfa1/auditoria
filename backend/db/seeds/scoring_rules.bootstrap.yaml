- id: CHECKLIST-VEICULO
  sector: checklist
  pop_ref: 4.6.1
  label: Checklist de Veículo - Receptivo
  context: PROCESSO CHECKLIST - WHATSAPP
  criteria:
  - label: O operador se identificou informando saudação.
    weight: 0.3
    deflator: 0.0
    description: 'A identificação profissionaliza o atendimento e garante clareza sobre quem está ligando. | Exemplo oficial:
      "Bom dia/Boa tarde/Boa noite."'
  - label: Enviou o auto texto perguntando qual o tipo de veículo?
    weight: 0.5
    deflator: 0.0
    description: 'A coleta correta da informação inicial é essencial para garantir a precisão do atendimento. | Exemplo oficial:
      "Qual o tipo do veículo? 1 - Carreta: Baú 2 - Carreta: Graneleiro - Saider - Contêiner 3 - Toco-Truck: Baú 4 - Toco-Truck:
      Graneleiro - Saider - Contêiner 5 - Outro: Nos informe o tipo"'
  - label: Seguiu corretamente o fluxo do checklist conforme a solicitação inicial?
    weight: 1.0
    deflator: 0.0
    description: Evita omissões ou atalhos que possam comprometer a precisão do checklist.
  - label: Realizou um atendimento cordial, utilizando linguagem apropriada?
    weight: 0.4
    deflator: 0.0
    description: 'Garante que a interação seja profissional e respeitosa. | Exemplo oficial: "Por favor, pode me informar
      quando realizar a solicitação"'
  - label: Informou o status final do checklist (aprovado ou reprovado)?
    weight: 1.3
    deflator: 0.0
    description: 'Transmite claramente a situação do veículo, evitando confusão. | Exemplo oficial: "Senhor(a) informo que
      o veículo está *APROVADO* no Checklist. Agradecemos o contato!"'
  - label: Se reprovado, informou corretamente o motivo da reprovação?
    weight: 1.3
    deflator: 0.0
    description: 'A comunicação clara e detalhada é importante para a compreensão do problema. | Exemplo oficial: "Prezado
      (a), informo que seu veículo foi *REPROVADO* por: sensor de baú. Dessa forma, favor verificar com o responsável para
      realizar manutenção no item que ficou reprovado e posteriormente agendar um novo check list via SIL. Agradecemos o contato!"'
  - label: Anexou imagens dos testes no SIL, correspondentes ao veículo e tecnologia analisada?
    weight: 2.0
    deflator: 0.0
    description: A documentação visual ajuda a validar o processo e oferece respaldo para a decisão.
    evaluation_type: manual
  - label: A informação passada no atendimento corresponde ao que foi registrado no SIL?
    weight: 2.0
    deflator: 0.0
    description: Verifica a consistência das informações entre o atendimento e o sistema.
    evaluation_type: manual
  - label: Encerrou o checklist no SIL em até 5 minutos após informar o status final?
    weight: 0.3
    deflator: 0.0
    description: Garante agilidade na atualização das informações, evitando atrasos.
    evaluation_type: manual
  - label: Realizou a despedida padrão com cordialidade?
    weight: 0.3
    deflator: 0.0
    description: 'Terminar o atendimento de maneira educada fortalece a boa impressão do serviço. | Exemplo oficial: "Atendimento
      finalizado, obrigado por utilizar nossos serviços."'
  - label: Encerrou o atendimento no Weon em até 5 minutos após informar o status final do checklist?
    weight: 0.3
    deflator: 0.0
    description: Evita filas de atendimento e promove agilidade no processo.
    evaluation_type: manual
  - label: Realizou a qualificação correta do atendimento?
    weight: 0.3
    deflator: 0.0
    description: A qualificação correta ajuda a categorizar e analisar a qualidade do atendimento.
    evaluation_type: manual
